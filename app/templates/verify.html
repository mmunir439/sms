<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الكود - FURY SMS</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/font-awesome.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .verify-container {
            background: var(--card, #1a1a1a);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border, #2e2e2e);
        }
        .verify-container h2 {
            color: var(--accent, #00d4ff);
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 10px;
            padding: 15px;
            background: var(--bg, #0d0d0d);
            border: 2px solid var(--border, #2e2e2e);
            color: var(--txt, #e8e8e8);
        }
        .form-control:focus {
            border-color: var(--accent, #00d4ff);
            box-shadow: 0 0 0 0.2rem rgba(0, 212, 255, 0.25);
        }
        .btn-verify {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
        }
        .btn-verify:hover {
            opacity: 0.9;
            color: #000;
        }
        .result-box {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid var(--border, #2e2e2e);
            display: none;
        }
        .result-box.error {
            border-color: var(--danger, #ff4757);
            background: rgba(255, 71, 87, 0.1);
        }
        .result-box.success {
            border-color: var(--success, #2ed573);
            background: rgba(46, 213, 115, 0.1);
        }
        .result-box h4 {
            margin-bottom: 15px;
        }
        .result-box.error h4 { color: var(--danger, #ff4757); }
        .result-box.success h4 { color: var(--success, #2ed573); }
        .code-display {
            background: var(--bg, #0d0d0d);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            text-align: center;
        }
        .code-display code {
            font-size: 24px;
            color: var(--accent, #00d4ff);
            letter-spacing: 3px;
        }
        .number-display {
            font-size: 36px;
            font-weight: bold;
            color: var(--warn, #ffa502);
        }
        .ring-info {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .ring-info h5 {
            color: var(--accent, #00d4ff);
            margin-bottom: 10px;
        }
        .price-tag {
            font-size: 28px;
            font-weight: bold;
            color: var(--success, #2ed573);
        }
        .redirect-btn {
            background: var(--success, #2ed573);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }
        .redirect-btn:hover {
            opacity: 0.9;
            color: #000;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <h2><i class="fa fa-check-circle"></i> التحقق من الكود</h2>

        {% if error %}
        <div class="alert alert-danger text-center">
            <i class="fa fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <form id="verifyForm">
            <div class="form-group">
                <label><i class="fa fa-key"></i> الكود</label>
                <input type="text" id="code" class="form-control text-center"
                       placeholder="أدخل الكود" required
                       style="font-size: 18px; letter-spacing: 3px; text-transform: uppercase;">
            </div>

            <div class="form-group">
                <label><i class="fa fa-hashtag"></i> الرقم</label>
                <input type="number" id="number" class="form-control text-center"
                       placeholder="أدخل الرقم (4 أرقام)" required
                       style="font-size: 18px;">
            </div>

            <button type="submit" class="btn btn-verify">
                <i class="fa fa-search"></i> تحقق الآن
            </button>
        </form>

        {% if success and code %}
        <div class="result-box success" style="display: block;">
            <h4 class="text-center"><i class="fa fa-check-circle"></i> الكود صحيح!</h4>

            <div class="code-display">
                <small>الكود</small><br>
                <code>{{ code }}</code>
            </div>

            <div class="code-display">
                <small>الرقم</small><br>
                <span class="number-display">{{ number }}</span>
            </div>

            <div class="ring-info">
                <h5><i class="fa fa-circle"></i> {{ ring_name }}</h5>
                <p class="price-tag">{{ ring_price }} USD</p>
            </div>

            {% if custom_link %}
            <div class="text-center">
                <a href="{{ custom_link }}" class="redirect-btn">
                    <i class="fa fa-external-link"></i> انتقل للرابط
                </a>
            </div>
            {% endif %}
        </div>
        {% endif %}

        <div id="result" class="result-box">
            <h4 id="result-title"></h4>
            <div id="result-content"></div>
        </div>

        <div class="text-center" style="margin-top: 20px;">
            <a href="/" style="color: var(--muted, #888); text-decoration: none;">
                <i class="fa fa-home"></i> العودة للرئيسية
            </a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    document.getElementById('verifyForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const code = document.getElementById('code').value.trim().toUpperCase();
        const number = document.getElementById('number').value.trim();

        if (!code || !number) {
            alert('الرجاء إدخال الكود والرقم');
            return;
        }

        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, number: number })
            });

            const result = await response.json();
            const resultBox = document.getElementById('result');

            if (result.success) {
                resultBox.className = 'result-box success';
                document.getElementById('result-title').innerHTML = '<i class="fa fa-check-circle"></i> الكود صحيح!';

                let content = `
                    <div class="code-display">
                        <small>الكود</small><br>
                        <code>${result.code}</code>
                    </div>
                    <div class="code-display">
                        <small>الرقم</small><br>
                        <span class="number-display">${result.number}</span>
                    </div>
                    <div class="ring-info">
                        <h5><i class="fa fa-circle"></i> ${result.ring_name}</h5>
                        <p class="price-tag">${result.ring_price} USD</p>
                    </div>
                `;

                if (result.custom_link) {
                    content += `
                        <div class="text-center">
                            <a href="${result.custom_link}" class="redirect-btn">
                                <i class="fa fa-external-link"></i> انتقل للرابط
                            </a>
                        </div>
                    `;
                }

                document.getElementById('result-content').innerHTML = content;
                resultBox.style.display = 'block';
            } else {
                resultBox.className = 'result-box error';
                document.getElementById('result-title').innerHTML = '<i class="fa fa-exclamation-triangle"></i> خطأ';
                document.getElementById('result-content').innerHTML = `<p>${result.error}</p>`;
                resultBox.style.display = 'block';
            }
        } catch (error) {
            alert('حدث خطأ في الاتصال. الرجاء المحاولة مرة أخرى.');
        }
    });
    </script>
</body>
</html>
